server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: file://${user.home}/config-repo
          default-label: main
          search-paths: '{application}'
          clone-on-start: true
          force-pull: true

logging:
  level:
    org.springframework.cloud.config.server: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
